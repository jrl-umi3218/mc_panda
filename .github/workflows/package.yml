---
name: Package mc_panda
on:
  repository_dispatch:
    types:
    - package-master
    - package-release
  pull_request:
    branches:
    - "**"
  push:
    paths-ignore:
    - README.md
    - ".github/workflows/build.yml"
    branches:
    - "**"
    tags:
    - v*
jobs:
  package:
    # uses: jrl-umi3218/github-actions/.github/workflows/package-project.yml@master
    uses: arntanguy/github-actions/.github/workflows/package-project.yml@topic/debug-packaging
    with:
      with-ros: false
      matrix: |
        {
          "dist": ["bionic", "focal"],
          "arch": ["amd64"]
        }
    secrets:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      GH_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
